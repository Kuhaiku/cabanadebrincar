<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checklist de Pedidos | Painel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap");
      body { font-family: "Quicksand", sans-serif; }
      .checkbox-custom:checked + label { text-decoration: line-through; color: #94a3b8; }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-7xl mx-auto flex flex-col h-[90vh]">
      <header class="flex justify-between items-center mb-6 shrink-0">
        <div class="flex items-center gap-4">
          <a href="painel.html" class="p-2 bg-white rounded-xl hover:bg-slate-100 transition-colors">
            <i data-lucide="arrow-left" class="text-slate-600"></i>
          </a>
          <h1 class="text-2xl font-bold text-slate-800">Checklist Operacional</h1>
        </div>
      </header>

      <div class="flex gap-6 flex-1 min-h-0">
        <div class="w-1/3 bg-white rounded-2xl shadow-sm border border-slate-100 flex flex-col overflow-hidden">
          <div class="p-4 border-b border-slate-100 bg-slate-50">
            <h2 class="font-bold text-slate-700">Festas Agendadas</h2>
          </div>
          <div id="listaPedidos" class="flex-1 overflow-y-auto p-2 space-y-2">
            <div class="text-center p-4 text-slate-400">Carregando...</div>
          </div>
        </div>

        <div class="w-2/3 bg-white rounded-2xl shadow-sm border border-slate-100 flex flex-col hidden" id="areaChecklist">
          <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <div>
              <h2 id="tituloFesta" class="text-xl font-bold text-slate-800">Selecione uma festa</h2>
              <p id="subtituloFesta" class="text-sm text-slate-500"></p>
            </div>
            <button onclick="gerarChecklistAutomatico()" class="bg-pink-100 text-pink-700 px-4 py-2 rounded-lg font-bold hover:bg-pink-200 flex items-center gap-2 text-sm transition-colors">
              <i data-lucide="wand-2" class="w-4 h-4"></i> Auto-Gerar do Pedido
            </button>
          </div>

          <div class="flex-1 overflow-y-auto p-6 bg-slate-50/50">
            <div id="listaEtapas" class="space-y-3">
              </div>
          </div>

          <div class="p-4 border-t border-slate-100 bg-white">
            <form onsubmit="adicionarEtapaManual(event)" class="flex gap-2">
              <input type="text" id="novaEtapa" placeholder="Nova etapa (ex: Separar brinde especial)..." class="flex-1 p-3 rounded-xl border border-slate-200 outline-none focus:border-pink-500" required />
              <button type="submit" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-900 transition-colors flex items-center gap-2">
                <i data-lucide="plus" class="w-5 h-5"></i> Adicionar
              </button>
            </form>
          </div>
        </div>
        
        <div id="estadoVazio" class="w-2/3 bg-white rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center text-slate-400">
          <i data-lucide="list-checks" class="w-16 h-16 mb-4 text-slate-200"></i>
          <p class="font-bold">Selecione um pedido ao lado para gerenciar o checklist.</p>
        </div>
      </div>
    </div>

    <script>
      const ADMIN_TOKEN = localStorage.getItem("cabana_admin_token");
      if (!ADMIN_TOKEN) window.location.href = "painel.html";

      let pedidosAgendados = [];
      let pedidoAtual = null;

      async function carregarPedidos() {
        try {
          // Busca apenas pedidos marcados como "agendado"
          const res = await fetch("/api/admin/agenda", { headers: { "x-admin-password": ADMIN_TOKEN } });
          pedidosAgendados = await res.json();
          renderizarListaPedidos();
        } catch (e) {
          console.error(e);
        }
      }

      function renderizarListaPedidos() {
        const container = document.getElementById("listaPedidos");
        if (pedidosAgendados.length === 0) {
          container.innerHTML = '<div class="text-center p-4 text-slate-400 text-sm">Nenhuma festa agendada.</div>';
          return;
        }

        container.innerHTML = pedidosAgendados.map(p => {
          let dataStr = p.data_festa ? new Date(p.data_festa.includes('T') ? p.data_festa.split('T')[0] + 'T00:00:00' : p.data_festa + 'T00:00:00').toLocaleDateString("pt-BR") : 'Sem data';
          return `
            <div onclick="selecionarPedido(${p.id})" id="btn_pedido_${p.id}" class="p-4 rounded-xl cursor-pointer hover:bg-pink-50 border border-transparent transition-all">
              <h3 class="font-bold text-slate-700">${p.nome}</h3>
              <p class="text-xs text-slate-500 flex justify-between mt-1">
                <span><i data-lucide="calendar" class="w-3 h-3 inline"></i> ${dataStr}</span>
                <span class="text-pink-600 font-bold">${p.modelo_barraca}</span>
              </p>
            </div>
          `;
        }).join("");
        lucide.createIcons();
      }

      async function selecionarPedido(id) {
        pedidoAtual = pedidosAgendados.find(p => p.id === id);
        
        // Estiliza o selecionado
        document.querySelectorAll("[id^='btn_pedido_']").forEach(el => {
          el.classList.remove("bg-pink-50", "border-pink-200");
          el.classList.add("border-transparent");
        });
        document.getElementById(`btn_pedido_${id}`).classList.add("bg-pink-50", "border-pink-200");
        document.getElementById(`btn_pedido_${id}`).classList.remove("border-transparent");

        // Altera visualização
        document.getElementById("estadoVazio").classList.add("hidden");
        document.getElementById("areaChecklist").classList.remove("hidden");
        
        document.getElementById("tituloFesta").innerText = `Festa de ${pedidoAtual.nome.split(" ")[0]}`;
        
        let dataFesta = pedidoAtual.data_festa ? new Date(pedidoAtual.data_festa.includes('T') ? pedidoAtual.data_festa.split('T')[0] + 'T00:00:00' : pedidoAtual.data_festa + 'T00:00:00').toLocaleDateString("pt-BR") : '';
        document.getElementById("subtituloFesta").innerText = `${dataFesta} às ${pedidoAtual.horario || '-'} | ${pedidoAtual.endereco || 'Endereço não informado'}`;

        carregarChecklist();
      }

   async function carregarChecklist() {
        const container = document.getElementById("listaEtapas");
        container.innerHTML = '<div class="text-center text-slate-400"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto"></i></div>';
        lucide.createIcons();

        try {
          const res = await fetch(`/api/admin/pedidos/${pedidoAtual.id}/checklist`, { headers: { "x-admin-password": ADMIN_TOKEN } });
          const etapas = await res.json();
          
          // PROTEÇÃO: Verifica se o servidor retornou um erro (ex: erro 500)
          if (!res.ok || etapas.error) {
              container.innerHTML = `
                <div class="text-center py-10">
                  <i data-lucide="alert-triangle" class="w-12 h-12 mx-auto text-red-400 mb-3"></i>
                  <p class="text-red-500 font-bold">Erro ao carregar o checklist.</p>
                  <p class="text-slate-500 text-sm mt-1">${etapas.error || 'Erro desconhecido no servidor.'}</p>
                </div>`;
              lucide.createIcons();
              return;
          }
          
          if (!Array.isArray(etapas) || etapas.length === 0) {
            container.innerHTML = `
              <div class="text-center py-10">
                <p class="text-slate-400 mb-4">O checklist está vazio.</p>
                <button onclick="gerarChecklistAutomatico()" class="text-pink-500 font-bold hover:underline">Gerar etapas automaticamente</button>
              </div>`;
            return;
          }

          container.innerHTML = etapas.map(e => `
            <div class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-slate-200 hover:border-pink-200 transition-colors group">
              <div class="flex items-center gap-3 flex-1 cursor-pointer">
                <input type="checkbox" id="chk_${e.id}" class="checkbox-custom w-5 h-5 text-pink-500 rounded border-gray-300 focus:ring-pink-500 cursor-pointer" 
                       ${e.concluido ? 'checked' : ''} onchange="alternarStatus(${e.id}, this.checked)">
                <label for="chk_${e.id}" class="font-semibold text-slate-700 cursor-pointer select-none flex-1 transition-all">${e.etapa}</label>
              </div>
              <button onclick="deletarEtapa(${e.id})" class="text-slate-300 hover:text-red-500 transition-colors p-2 opacity-0 group-hover:opacity-100">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          `).join("");
          lucide.createIcons();
        } catch (e) {
          console.error(e);
          container.innerHTML = `<div class="text-center py-10 text-red-500 font-bold">Erro de conexão.</div>`;
        }
      }
      async function adicionarEtapaManual(e) {
        e.preventDefault();
        const input = document.getElementById("novaEtapa");
        const etapa = input.value.trim();
        if (!etapa || !pedidoAtual) return;

        await criarEtapaNoBanco(etapa);
        input.value = "";
        carregarChecklist();
      }

      async function alternarStatus(id, concluido) {
        await fetch(`/api/admin/checklist/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json", "x-admin-password": ADMIN_TOKEN },
          body: JSON.stringify({ concluido })
        });
      }

      async function deletarEtapa(id) {
        await fetch(`/api/admin/checklist/${id}`, {
          method: "DELETE",
          headers: { "x-admin-password": ADMIN_TOKEN }
        });
        carregarChecklist();
      }

      async function criarEtapaNoBanco(texto) {
        await fetch(`/api/admin/pedidos/${pedidoAtual.id}/checklist`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-admin-password": ADMIN_TOKEN },
          body: JSON.stringify({ etapa: texto })
        });
      }

      // --- INTELIGÊNCIA: PUXAR DADOS DO BANCO/PEDIDO ---
      async function gerarChecklistAutomatico() {
        if (!pedidoAtual) return;
        
        const btn = document.querySelector("button[onclick='gerarChecklistAutomatico()']");
        btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Gerando...`;
        lucide.createIcons();

        // Limpa texto antigo de carregamento se existir
        document.getElementById("listaEtapas").innerHTML = '<div class="text-center text-slate-400">Processando...</div>';

        const etapasSugeridas = [];

        // 1. Mensagem pré-festa
        etapasSugeridas.push(`Enviar mensagem de confirmação no WhatsApp (${pedidoAtual.whatsapp}) um dia antes.`);

        // 2. Estrutura
        if (pedidoAtual.modelo_barraca !== "PEGUE E MONTE") {
            etapasSugeridas.push(`Separar ${pedidoAtual.qtd_barracas}x ${pedidoAtual.modelo_barraca} e verificar integridade.`);
        } else {
            etapasSugeridas.push(`Deixar pacote ${pedidoAtual.tema || ''} separado para o cliente retirar.`);
        }

        // 3. Tema e Cores
        if (pedidoAtual.tema || pedidoAtual.cores) {
            etapasSugeridas.push(`Separar itens decorativos. Tema: ${pedidoAtual.tema || 'N/A'}, Cores: ${pedidoAtual.cores || 'N/A'}.`);
        }

        // 4. Alimentação
        if (pedidoAtual.alimentacao && pedidoAtual.alimentacao !== "[]" && pedidoAtual.alimentacao !== '""') {
            etapasSugeridas.push(`Preparar kits de alimentação.`);
        }

        // 5. Alergias (Atenção Máxima)
        if (pedidoAtual.alergias && pedidoAtual.alergias.trim() !== "") {
            etapasSugeridas.push(`ATENÇÃO: Cliente relatou alergias/restrições: ${pedidoAtual.alergias}. Verificar itens.`);
        }

        // 6. Rota/Endereço
        if (pedidoAtual.endereco && pedidoAtual.modelo_barraca !== "PEGUE E MONTE") {
            etapasSugeridas.push(`Revisar rota para o endereço: ${pedidoAtual.endereco}.`);
        }

        // Salva todas em sequência
        for (const etapa of etapasSugeridas) {
          await criarEtapaNoBanco(etapa);
        }

        btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Gerado!`;
        lucide.createIcons();
        setTimeout(() => {
          btn.innerHTML = `<i data-lucide="wand-2" class="w-4 h-4"></i> Auto-Gerar do Pedido`;
          lucide.createIcons();
        }, 2000);

        carregarChecklist();
      }

      carregarPedidos();
    </script>
  </body>
</html>
